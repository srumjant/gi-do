// ==========================================
//  RENDERING
// ==========================================
function renderSprite(canvas, data, palette, scale) {
  const rows = data.length, cols = data[0].length;
  canvas.width = cols * scale;
  canvas.height = rows * scale;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // Checkerboard background
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      ctx.fillStyle = (r + c) % 2 === 0 ? '#2a2a3e' : '#252538';
      ctx.fillRect(c * scale, r * scale, scale, scale);
    }
  }
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const v = data[r][c];
      if (!v) continue;
      ctx.fillStyle = palette[v] || '#ff00ff';
      ctx.fillRect(c * scale, r * scale, scale, scale);
    }
  }
}

function renderCombined(canvas, sprites, palettes, offsets, scale) {
  // Find bounding box
  let maxW = 0, maxH = 0;
  sprites.forEach((spr, i) => {
    const [ox, oy] = offsets[i];
    maxW = Math.max(maxW, ox + spr[0].length);
    maxH = Math.max(maxH, oy + spr.length);
  });
  canvas.width = maxW * scale;
  canvas.height = maxH * scale;
  const ctx = canvas.getContext('2d');
  // Checkerboard
  for (let r = 0; r < maxH; r++) {
    for (let c = 0; c < maxW; c++) {
      ctx.fillStyle = (r + c) % 2 === 0 ? '#2a2a3e' : '#252538';
      ctx.fillRect(c * scale, r * scale, scale, scale);
    }
  }
  sprites.forEach((spr, i) => {
    const pal = palettes[i];
    const [ox, oy] = offsets[i];
    for (let r = 0; r < spr.length; r++) {
      for (let c = 0; c < spr[r].length; c++) {
        const v = spr[r][c];
        if (!v) continue;
        ctx.fillStyle = pal[v] || '#ff00ff';
        ctx.fillRect((ox + c) * scale, (oy + r) * scale, scale, scale);
      }
    }
  });
}

function createSpriteBox(label, data, palette, extraClass) {
  const box = document.createElement('div');
  box.className = 'sprite-box' + (extraClass ? ' ' + extraClass : '');
  const canvas = document.createElement('canvas');
  renderSprite(canvas, data, palette, SCALE);
  box.appendChild(canvas);
  const lbl = document.createElement('div');
  lbl.className = 'label';
  lbl.textContent = label;
  box.appendChild(lbl);
  return { box, canvas, data, palette };
}

function createCombinedBox(label, sprites, palettes, offsets) {
  const box = document.createElement('div');
  box.className = 'sprite-box combined';
  const canvas = document.createElement('canvas');
  renderCombined(canvas, sprites, palettes, offsets, SCALE);
  box.appendChild(canvas);
  const lbl = document.createElement('div');
  lbl.className = 'label';
  lbl.textContent = label;
  box.appendChild(lbl);
  return { box, canvas, sprites, palettes, offsets };
}

  row = addSection('Chicken (Power-up Transform)');
  const chickenBox = createSpriteBox('Chicken', CHICKEN_S, CHICKEN_P);
  row.appendChild(chickenBox.box); allBoxes.push(chickenBox);

  // --- BOSS CH1 ---
  row = addSection('Boss: Kidnapper (Chapter 1)');
  [['Idle', BOSS_IDLE], ['Walk', BOSS_WALK], ['Charge', BOSS_CHARGE], ['Roar', BOSS_ROAR]].forEach(([l, d]) => {
    const b = createSpriteBox(l, d, BOSS_P);
    row.appendChild(b.box); allBoxes.push(b);
  });

  // --- BOSS CH2 ---
  row = addSection('Boss: Robot King (Chapter 2)');
  [['Idle', ROBO_IDLE], ['Walk', ROBO_WALK], ['Charge', ROBO_CHARGE], ['Roar', ROBO_ROAR]].forEach(([l, d]) => {
    const b = createSpriteBox(l, d, ROBO_P);
    row.appendChild(b.box); allBoxes.push(b);
  });
}

function setScale(s) {
  SCALE = s;
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  // Re-render all
  allBoxes.forEach(b => {
    if (b.sprites) {
      renderCombined(b.canvas, b.sprites, b.palettes, b.offsets, SCALE);
    } else {
      renderSprite(b.canvas, b.data, b.palette, SCALE);
    }
  });
}

buildUI();
</script>
</body>
</html>

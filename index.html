  const isFS=!!(document.fullscreenElement||document.webkitFullscreenElement);

  const isMobile='ontouchstart' in window;
  const availH=isMobile&&!isFS?window.innerHeight*0.65:window.innerHeight;
  const s = Math.min(window.innerWidth/BASE_W, availH/BASE_H, maxScale);
  canvas.width=BASE_W; canvas.height=BASE_H;
  canvas.style.width=Math.floor(BASE_W*s)+'px'; canvas.style.height=Math.floor(BASE_H*s)+'px';
}

const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }
function playTone(f,d,t,v,sl) {
  try { ensureAudio(); const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type=t||'square';
  o.frequency.setValueAtTime(f,audioCtx.currentTime); if(sl) o.frequency.linearRampToValueAtTime(sl,audioCtx.currentTime+d);
  g.gain.setValueAtTime(v||0.15,audioCtx.currentTime); g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+d);
  o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+d); } catch(e){}
}

let bgmNoteIdx=0;
function startBGM(levelIdx){
  stopBGM();
  if(levelIdx<0||levelIdx>=BGM_THEMES.length)return;
  bgmLevel=levelIdx; bgmNoteIdx=0;
  const theme=BGM_THEMES[levelIdx];
  const interval=60000/theme.bpm;
  function playNote(){
    if(bgmLevel!==levelIdx)return;
    try{
      ensureAudio();
      const f=theme.notes[bgmNoteIdx%theme.notes.length];
      const bf=theme.bassN[bgmNoteIdx%theme.bassN.length];
      const dur=interval/1000*0.8;
      // Melody
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type=theme.wave;o.frequency.setValueAtTime(f,audioCtx.currentTime);
      g.gain.setValueAtTime(theme.vol,audioCtx.currentTime);g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+dur);
      o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur);
      // Bass
      const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();
      o2.type=theme.bass;o2.frequency.setValueAtTime(bf,audioCtx.currentTime);
      g2.gain.setValueAtTime(theme.bassVol,audioCtx.currentTime);g2.gain.linearRampToValueAtTime(0,audioCtx.currentTime+dur*1.2);
      o2.connect(g2);g2.connect(audioCtx.destination);o2.start();o2.stop(audioCtx.currentTime+dur*1.2);
    }catch(e){}
    bgmNoteIdx++;
    bgmTimer=setTimeout(playNote,interval);
  }
  bgmTimer=setTimeout(playNote,200);
}
function stopBGM(){if(bgmTimer){clearTimeout(bgmTimer);bgmTimer=null;}bgmLevel=-1;}

function drawSprite(d,x,y,p,sc,fl) {
  ctx.save(); if(fl){ctx.translate(x+d[0].length*sc,y);ctx.scale(-1,1)}else ctx.translate(x,y);
  for(let r=0;r<d.length;r++) for(let c=0;c<d[r].length;c++){const v=d[r][c];if(!v)continue;ctx.fillStyle=p[v];ctx.fillRect(c*sc,r*sc,sc,sc);}
  ctx.restore();
}
function spriteH(s,sc){return s.length*sc} function spriteW(s,sc){return s[0].length*sc}

function makeGround(w,h){ const m=Array.from({length:h},()=>Array(w).fill(0)); for(let y=h-2;y<h;y++) for(let x=0;x<w;x++) m[y][x]=1; return m; }
function addPlats(m,ps){ ps.forEach(([px,py,pw])=>{for(let i=0;i<pw;i++)if(px+i<m[0].length)m[py][px+i]=2;}); }
function addQBlocks(m,qs){ qs.forEach(([qx,qy])=>m[qy][qx]=3); }
function addCrates(m,cs){ cs.forEach(([cx,cy])=>m[cy][cx]=4); }
function addGaps(m,gs,h,gapMult){
  gs.forEach(([gx,gw])=>{
    const actualW = Math.max(1, Math.round(gw * gapMult));
    for(let i=0;i<actualW;i++) for(let gy=h-2;gy<h;gy++) if(gx+i<m[0].length) m[gy][gx+i]=0;
  });
}

function setupMobile(){
  const ids={
    'btn-left':'ArrowLeft','btn-right':'ArrowRight',
    'btn-jump':'Space','btn-shoot':'KeyX','btn-ok':'Enter'
  };
  Object.entries(ids).forEach(([id,code])=>{
    const b=document.getElementById(id);
    if(!b)return;
    function press(){if(!keys[code])justPressed[code]=true;keys[code]=true;b.classList.add('pressed');}
    function release(){keys[code]=false;b.classList.remove('pressed');}
    b.addEventListener('touchstart',e=>{e.preventDefault();press();},{passive:false});
    b.addEventListener('touchend',e=>{e.preventDefault();release();},{passive:false});
    b.addEventListener('touchcancel',()=>release());
    b.addEventListener('mousedown',press);
    b.addEventListener('mouseup',release);
    b.addEventListener('mouseleave',release);
  });
  // Prevent default on the whole controls area to avoid scrolling
  const mc=document.getElementById('mobile-controls');
  if(mc)mc.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
}
setupMobile();

// Fullscreen
const fsBtn=document.getElementById('fullscreen-btn');
function isFullscreen(){return !!(document.fullscreenElement||document.webkitFullscreenElement);}
function updateFsBtn(){if(fsBtn)fsBtn.textContent=isFullscreen()?'✕':'⛶';}
if(fsBtn){
  fsBtn.addEventListener('click',()=>{
    const el=document.documentElement;
    if(!isFullscreen()){
      const req=el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen;
      if(req)req.call(el).catch(()=>{});
    }else{
      const exit=document.exitFullscreen||document.webkitExitFullscreen||document.msExitFullscreen;
      if(exit)exit.call(document).catch(()=>{});
    }
  });
  function onFsChange(){
    updateFsBtn();
    if(isFullscreen()&&screen.orientation&&screen.orientation.lock){
      screen.orientation.lock('landscape').catch(()=>{});
    }
    setTimeout(resizeCanvas,100);resizeCanvas();
  }
  document.addEventListener('fullscreenchange',onFsChange);
  document.addEventListener('webkitfullscreenchange',onFsChange);
}
// Auto-show fullscreen hint on mobile
if('ontouchstart' in window&&fsBtn){
  fsBtn.style.background='rgba(255,200,0,0.4)';fsBtn.style.borderColor='rgba(255,200,0,0.7)';
  fsBtn.style.width='48px';fsBtn.style.height='48px';fsBtn.style.fontSize='22px';
}
// Auto-enter fullscreen+landscape on first touch on mobile
if('ontouchstart' in window){
  function autoFullscreenLandscape(){
    const el=document.documentElement;
    const req=el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen;
    if(req&&!isFullscreen())req.call(el).catch(()=>{});
    document.removeEventListener('touchstart',autoFullscreenLandscape);
  }
  document.addEventListener('touchstart',autoFullscreenLandscape,{once:true});
}

function findGroundY(tx){const l=LEVELS[currentLevel];for(let ty=0;ty<l.height;ty++)if(tx>=0&&tx<l.width&&isSolid(map[ty][tx]))return ty*TILE;return(l.height-2)*TILE;}
function getTile(px,py){const tx=Math.floor(px/TILE),ty=Math.floor(py/TILE),l=LEVELS[currentLevel];if(tx<0||ty<0||ty>=l.height||tx>=l.width)return 0;return map[ty][tx];}
function isSolid(t){return t===1||t===2||t===3||t===4;}
function rectOverlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function spawnParticles(x,y,c,n){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*4,vy:-Math.random()*4-1,life:30+Math.random()*20,color:c});}
function breakCrate(tx,ty){
  if(tx<0||ty<0||ty>=LEVELS[currentLevel].height||tx>=LEVELS[currentLevel].width)return;
  if(map[ty][tx]!==4)return;
  map[ty][tx]=0;
  const px=tx*TILE+8, py=ty*TILE+8;
  for(let i=0;i<8;i++){
    const c=CRATE_PARTICLES[Math.floor(Math.random()*CRATE_PARTICLES.length)];
    particles.push({x:px,y:py,vx:(Math.random()-.5)*6,vy:-Math.random()*5-2,life:40+Math.random()*20,color:c});
  }
  if(Math.random()<0.3){
    stars.push({x:tx*TILE,y:ty*TILE-TILE,vy:-2,collected:false});
  }
  sfxCrateBreak();
  crateCombo++;crateComboTimer=60;
  if(crateCombo>=3){
    smashTexts.push({x:px,y:py-10,life:60,text:crateCombo>=5?'MEGA SMASH!':'SMASH!',scale:crateCombo>=5?2:1.5});
    for(let i=0;i<crateCombo;i++){
      stars.push({x:px+(Math.random()-.5)*40,y:py-TILE*2-Math.random()*30,vy:-1-Math.random(),collected:false});
    }
    sfxWin();
    if(crateCombo>=5){player.invincible=Math.max(player.invincible,8);}
  }
}
function clearJP(){Object.keys(justPressed).forEach(k=>justPressed[k]=false);}

function initLevel(idx){
  const lvl=LEVELS[idx], dc=DC();
  map=lvl.generate(dc);
  const ps=getPlayerSprites(), ph=spriteH(ps.stand,2), pw=spriteW(ps.stand,2);
  player={x:lvl.playerStart[0]*TILE, y:lvl.playerStart[1]*TILE, vx:0, vy:0, w:pw-4, h:ph-4,
    onGround:false, facing:1, frame:0, frameTimer:0, invincible:0,
    hasBow:false, bowCharges:0, arrowCooldown:0, hasCape:dc.startWithCape};
  enemies=[]; pendingEnemies=lvl.enemyDefs.map(e=>({...e,spawned:false}));
  let bowPos=lvl.bowPositions||[], superPos=lvl.superPositions||[];
  // Extra pickups on super easy
  if(dc.enemySkipChance){
    const extra=[];for(let i=10;i<lvl.width-10;i+=20)extra.push(i);
    superPos=[...superPos,...extra];
    bowPos=[...bowPos,...extra.map(x=>x+5)];
  }
  bowPickups=bowPos.map(tx=>({x:tx*TILE,y:findGroundY(tx)-spriteH(BOW_S,2),collected:false}));
  superPickups=superPos.map(tx=>({x:tx*TILE,y:findGroundY(tx)-spriteH(SUPER_S,2),collected:false}));
  // Cat pickup - one per level
  cat=null;
  if(lvl.catPosition!=null){
    const cx=lvl.catPosition;
    catPickup={x:cx*TILE,y:findGroundY(cx)-spriteH(CAT_S,2),collected:false};
  }else{catPickup=null;}
  stars=[]; questionBlocks=[]; arrows=[]; enemyProjectiles=[];
  for(let y=0;y<lvl.height;y++) for(let x=0;x<lvl.width;x++) if(map[y][x]===3) questionBlocks.push({x,y,hit:false});
  particles=[]; crateCombo=0;crateComboTimer=0;smashTexts=[]; camera={x:0,y:0}; gameState='playing';
  // Boss on final level
  const isFinal=(idx===LEVELS.length-1);
  bossDefeated=false;
  if(isFinal){
    const bossScale=4;
    const bTX=lvl.rescuePos[0]-6;
    const bGY=findGroundY(bTX);
    const bH=spriteH(BOSS_IDLE,bossScale),bW=spriteW(BOSS_IDLE,bossScale);
    const hp=dc.enemySpeed<=0.4?5:dc.enemySpeed<=0.7?7:dc.enemySpeed<=1.0?10:14;
    boss={x:bTX*TILE,y:bGY-bH,vx:0,w:bW,h:bH,hp,maxHp:hp,alive:true,
      shootTimer:0,shootInterval:dc.enemyShootInterval*1.2,
      chargeTimer:0,charging:false,chargeVx:0,
      hurtTimer:0,phase:0,facing:-1,frame:0,frameTimer:0,
      roarTimer:0,roarCooldown:0};
  }else{boss=null;}
  startBGM(idx);
}

function spawnEnemy(def){
  const dc=DC(), gy=findGroundY(def.x), info=getEnemySpriteInfo(def.type);
  const h=spriteH(info.sprite,ENEMY_SCALE), w=spriteW(info.sprite,ENEMY_SCALE);
  const e={type:def.type,x:def.x*TILE,y:gy-h,vx:-0.8*dc.enemySpeed,alive:true,frame:0,frameTimer:0,w,h,squashTimer:0};
  if(def.type==='ghost'){e.y=gy-h-40;e.vx=0;e.originY=e.y;e.noGravity=true;}
  if(def.type==='bat'||def.type==='icebat'){e.y=gy-h-60;e.originY=e.y;e.vx=-1.2*dc.enemySpeed;e.noGravity=true;e.sineOffset=Math.random()*Math.PI*2;}
  if(def.type==='cannon'){e.vx=0;e.shootTimer=60+Math.floor(Math.random()*60);e.shootInterval=dc.enemyShootInterval;e.noStomp=true;}
  if(def.type==='bouncer'){e.vx=-1.0*dc.enemySpeed;e.bounceTimer=0;}
  if(def.type==='penguin'){e.vx=-0.6*dc.enemySpeed;}
  return e;
}

// ==========================================
//  UPDATE
// ==========================================
function update(){
  animFrame++;
  // Language toggle
  if(justPressed['KeyL']){lang=lang==='et'?'en':'et';justPressed['KeyL']=false;}
  // Debug level selector — hold B for 3 seconds
  if(debugHoldStart>0&&keys['KeyB']&&gameState!=='debug'&&Date.now()-debugHoldStart>=3000){
    gameState='debug';debugLevelIndex=0;debugHoldStart=0;
    // Ensure we have difficulty & character set
    if(!selectedDifficulty)selectedDifficulty=DIFF_KEYS[0];
    if(!selectedChar)selectedChar='gigi';
  }
  if(gameState==='debug'){
    if(justPressed['ArrowLeft']||justPressed['KeyA'])debugLevelIndex=Math.max(0,debugLevelIndex-1);
    if(justPressed['ArrowRight']||justPressed['KeyD'])debugLevelIndex=Math.min(LEVELS.length-1,debugLevelIndex+1);
    if(justPressed['ArrowUp']||justPressed['KeyW']){diffIndex=(diffIndex-1+DIFF_KEYS.length)%DIFF_KEYS.length;selectedDifficulty=DIFF_KEYS[diffIndex];}
    if(justPressed['ArrowDown']||justPressed['KeyS']){diffIndex=(diffIndex+1)%DIFF_KEYS.length;selectedDifficulty=DIFF_KEYS[diffIndex];}
    if(justPressed['Space']||justPressed['Enter']){
      ensureAudio();currentLevel=debugLevelIndex;lives=DC().lives;score=0;initLevel(currentLevel);
      justPressed['Space']=false;justPressed['Enter']=false;
    }
    if(justPressed['Escape']){gameState='title';justPressed['Escape']=false;}
    clearJP();return;
  }
  if(gameState==='title'){if(keys['Space']||keys['Enter']){ensureAudio();gameState='difficulty';diffIndex=0;justPressed['Space']=false;justPressed['Enter']=false;}return;}
  if(gameState==='difficulty'){
    if(justPressed['ArrowLeft']||justPressed['KeyA']){diffIndex=Math.max(0,diffIndex-1);}
    if(justPressed['ArrowRight']||justPressed['KeyD']){diffIndex=Math.min(DIFF_KEYS.length-1,diffIndex+1);}
    if(justPressed['Space']||justPressed['Enter']){selectedDifficulty=DIFF_KEYS[diffIndex];gameState='select';selectIndex=0;justPressed['Space']=false;justPressed['Enter']=false;}
    clearJP();return;
  }
  if(gameState==='select'){
    if(justPressed['ArrowLeft']||justPressed['KeyA'])selectIndex=0;
    if(justPressed['ArrowRight']||justPressed['KeyD'])selectIndex=1;
    if(selectIndex===0&&(justPressed['ArrowUp']||justPressed['KeyW'])){gigiSkin=(gigiSkin-1+GIGI_SKINS.length)%GIGI_SKINS.length;}
    if(selectIndex===0&&(justPressed['ArrowDown']||justPressed['KeyS'])){gigiSkin=(gigiSkin+1)%GIGI_SKINS.length;}
    if(justPressed['Space']||justPressed['Enter']){selectedChar=selectIndex===0?'gigi':'dodo';gameState='intro';introTimer=0;justPressed['Space']=false;justPressed['Enter']=false;}
    clearJP();return;
  }
  if(gameState==='intro'){introTimer++;if(introTimer>660||(introTimer>120&&(justPressed['Space']||justPressed['Enter']))){currentLevel=0;lives=DC().lives;score=0;initLevel(0);justPressed['Space']=false;justPressed['Enter']=false;}clearJP();return;}
  if(gameState==='dead'){stateTimer--;if(stateTimer<=0){if(lives>0)initLevel(currentLevel);else{gameState='gameover';stateTimer=180;}}return;}
  if(gameState==='gameover'){stateTimer--;if(stateTimer<=0||justPressed['Space']){gameState='title';clearJP();}return;}
  if(gameState==='levelcomplete'){stateTimer--;if(stateTimer<=0){currentLevel++;if(currentLevel>=LEVELS.length){gameState='win';stateTimer=300;sfxWin();}else{gameState='between';betweenTimer=0;}}return;}
  if(gameState==='between'){betweenTimer++;if(betweenTimer>480||(betweenTimer>120&&(justPressed['Space']||justPressed['Enter']))){initLevel(currentLevel);justPressed['Space']=false;justPressed['Enter']=false;}clearJP();return;}
  if(gameState==='win'){stateTimer--;if(stateTimer<=0||justPressed['Space']){gameState='title';clearJP();}return;}
  if(gameState!=='playing')return;

  const p=player, dc=DC(), lvl=LEVELS[currentLevel];

  // Spawn enemies in field of view
  const crT=Math.floor((camera.x+BASE_W)/TILE)+1, clT=Math.floor(camera.x/TILE)-1;
  pendingEnemies.forEach(d=>{if(!d.spawned&&d.x>=clT&&d.x<=crT){d.spawned=true;if(dc.enemySkipChance&&Math.random()<dc.enemySkipChance)return;enemies.push(spawnEnemy(d));}});

  // Player movement
  if(keys['ArrowLeft']||keys['KeyA']){p.vx=-dc.playerSpeed;p.facing=-1;}
  else if(keys['ArrowRight']||keys['KeyD']){p.vx=dc.playerSpeed;p.facing=1;}
  else{p.vx*=.7;if(Math.abs(p.vx)<.1)p.vx=0;}
  if((keys['Space']||keys['ArrowUp']||keys['KeyW'])&&p.onGround){p.vy=dc.jumpForce;p.onGround=false;sfxJump();}

  // Shoot
  if(p.arrowCooldown>0)p.arrowCooldown--;
  if(p.hasBow&&p.bowCharges>0&&(justPressed['KeyX']||justPressed['KeyZ']||justPressed['ShiftRight']||justPressed['ControlRight'])&&p.arrowCooldown<=0){
    arrows.push({x:p.facing>0?p.x+p.w:p.x-12,y:p.y+p.h/2-2,vx:p.facing*6,life:60});
    p.bowCharges--;if(p.bowCharges<=0)p.hasBow=false;p.arrowCooldown=15;sfxShoot();
  }

  p.vy+=GRAVITY;if(p.vy>8)p.vy=8;
  p.x+=p.vx;
  const pL=p.x+2,pR=p.x+p.w-2,pT=p.y+1,pB=p.y+p.h-1;
  if(p.vx>0){if(isSolid(getTile(pR,pT))||isSolid(getTile(pR,pB))||isSolid(getTile(pR,pT+(pB-pT)/2))){p.x=Math.floor(pR/TILE)*TILE-p.w+1;p.vx=0;}}
  else if(p.vx<0){if(isSolid(getTile(pL,pT))||isSolid(getTile(pL,pB))||isSolid(getTile(pL,pT+(pB-pT)/2))){p.x=Math.floor(pL/TILE)*TILE+TILE-2;p.vx=0;}}
  p.y+=p.vy;p.onGround=false;
  const pL2=p.x+3,pR2=p.x+p.w-3;
  if(p.vy>0){const fY=p.y+p.h;if(isSolid(getTile(pL2,fY))||isSolid(getTile(pR2,fY))){p.y=Math.floor(fY/TILE)*TILE-p.h;p.vy=0;p.onGround=true;
  const cTy=Math.floor(fY/TILE);[Math.floor(pL2/TILE),Math.floor(pR2/TILE)].forEach(cTx=>{if(map[cTy]&&map[cTy][cTx]===4)breakCrate(cTx,cTy);});
}}
if(p.onGround){crateComboTimer--;if(crateComboTimer<=0)crateCombo=0;}
  else if(p.vy<0){const hY=p.y;if(isSolid(getTile(pL2,hY))||isSolid(getTile(pR2,hY))){p.y=Math.floor(hY/TILE)*TILE+TILE;p.vy=0;
    const h1=Math.floor(pL2/TILE),h2=Math.floor(pR2/TILE),hy=Math.floor(hY/TILE);
    [h1,h2].forEach(hx=>{const qb=questionBlocks.find(q=>q.x===hx&&q.y===hy&&!q.hit);if(qb){qb.hit=true;map[qb.y][qb.x]=2;stars.push({x:qb.x*TILE,y:qb.y*TILE-TILE,vy:-2,collected:false});spawnParticles(qb.x*TILE+8,qb.y*TILE,'#ffdd00',5);sfxBlock();}});
  }}
  if(p.x<0)p.x=0;
  if(p.y>lvl.height*TILE+32){if(DC().capeSavesPit&&p.hasCape){p.hasCape=false;p.invincible=60;p.vy=-10;p.y=lvl.height*TILE-32;spawnParticles(p.x+8,p.y+4,'#ff4400',12);playTone(400,.15,'sawtooth',.12,200);}else{playerDie();}return;}
  if(!p.onGround)p.frame=2;else if(Math.abs(p.vx)>.5){p.frameTimer++;if(p.frameTimer>8){p.frame=p.frame===0?1:0;p.frameTimer=0;}}else p.frame=0;
  if(p.invincible>0)p.invincible--;

  // Pickups
  bowPickups.forEach(b=>{if(!b.collected&&rectOverlap({x:p.x,y:p.y,w:p.w,h:p.h},{x:b.x,y:b.y,w:16,h:16})){b.collected=true;p.hasBow=true;p.bowCharges=dc.bowCharges;sfxPickup();spawnParticles(b.x+8,b.y+8,'#aa6633',6);}});
  superPickups.forEach(s=>{if(!s.collected&&rectOverlap({x:p.x,y:p.y,w:p.w,h:p.h},{x:s.x,y:s.y,w:16,h:16})){s.collected=true;p.hasCape=true;sfxPickup();spawnParticles(s.x+8,s.y+8,'#ff4400',10);}});
  // Cat pickup
  if(catPickup&&!catPickup.collected&&rectOverlap({x:p.x,y:p.y,w:p.w,h:p.h},{x:catPickup.x,y:catPickup.y,w:16,h:22})){
    catPickup.collected=true;
    cat={x:p.x-20,y:p.y,vx:0,vy:0,facing:1,frame:0,frameTimer:0,scratchTimer:0,scratchTarget:null,hitsLeft:3,bounceDir:1,baseY:0,onGround:true};
    sfxPickup();spawnParticles(catPickup.x+8,catPickup.y+8,'#8888aa',12);
    playTone(600,.15,'sine',.06);setTimeout(()=>playTone(800,.15,'sine',.06),100);setTimeout(()=>playTone(1000,.1,'sine',.05),200);
  }
  // Cat companion AI — bounces side to side, max 3 enemy scratches
  if(cat&&cat.hitsLeft>0){
    // Bounce side-to-side near the player
    const catH=spriteH(CAT_S,2);
    const playerCenterX=p.x+p.w/2;
    const bounceRange=60;
    // Cat bounces in arcs around the player
    cat.x+=cat.bounceDir*2.5;
    // Reverse direction when too far from player
    if(cat.x>playerCenterX+bounceRange){cat.bounceDir=-1;cat.facing=-1;}
    else if(cat.x<playerCenterX-bounceRange){cat.bounceDir=1;cat.facing=1;}
    // Jumping arc
    const groundY=p.y+p.h-catH;
    if(cat.onGround){
      cat.vy=-5.5;cat.onGround=false;
      cat.baseY=groundY;
    }
    cat.vy+=0.35;
    cat.y+=cat.vy;
    if(cat.y>=cat.baseY){cat.y=cat.baseY;cat.vy=0;cat.onGround=true;}
    // Keep cat roughly at player height when player moves vertically
    cat.baseY=groundY;
    cat.frameTimer++;if(cat.frameTimer>8){cat.frame=1-cat.frame;cat.frameTimer=0;}
    // Scratch nearby enemies (max 3 total)
    cat.scratchTimer=Math.max(0,cat.scratchTimer-1);
    const scratchRange=45;
    enemies.forEach(e=>{
      if(!e.alive||cat.scratchTimer>0||cat.hitsLeft<=0)return;
      const edx=e.x+e.w/2-(cat.x+8),edy=e.y+e.h/2-(cat.y+8);
      if(Math.sqrt(edx*edx+edy*edy)<scratchRange){
        e.alive=false;e.squashTimer=30;
        cat.scratchTimer=30;cat.scratchTarget={x:e.x+e.w/2,y:e.y+e.h/2};
        cat.hitsLeft--;
        score+=Math.round(300*dc.scoreMultiplier);
        spawnParticles(e.x+e.w/2,e.y,'#8888aa',10);sfxStomp();
        // Cat disappears in puff after last hit
        if(cat.hitsLeft<=0){
          spawnParticles(cat.x+8,cat.y+8,'#555566',15);
          playTone(300,.1,'sine',.05);
        }
      }
    });
  } else if(cat&&cat.hitsLeft<=0){
    // Cat used up all scratches — remove it
    cat=null;
  }

  // Arrows
  arrows.forEach(a=>{a.x+=a.vx;a.life--;
  const atx1=Math.floor(a.x/TILE),atx2=Math.floor((a.x+10)/TILE),aty=Math.floor(a.y/TILE);
  if(isSolid(getTile(a.x,a.y))||isSolid(getTile(a.x+10,a.y))){[atx1,atx2].forEach(atx=>{if(map[aty]&&map[aty][atx]===4)breakCrate(atx,aty);});a.life=0;}
    enemies.forEach(e=>{if(!e.alive)return;if(rectOverlap({x:a.x,y:a.y,w:12,h:4},{x:e.x,y:e.y,w:e.w,h:e.h})){e.alive=false;e.squashTimer=30;a.life=0;score+=Math.round(200*dc.scoreMultiplier);spawnParticles(e.x+e.w/2,e.y,'#ff6600',8);sfxStomp();}});
  });
  arrows=arrows.filter(a=>a.life>0);

  // Stars
  stars.forEach(s=>{if(s.collected)return;if(s.vy){s.vy+=.1;s.y+=s.vy;if(s.vy>0)s.vy=0;}
    if(rectOverlap({x:p.x,y:p.y,w:p.w,h:p.h},{x:s.x,y:s.y,w:10,h:10})){s.collected=true;score+=Math.round(100*dc.scoreMultiplier);spawnParticles(s.x+5,s.y+5,'#ffdd00',8);sfxCoin();}});

  // Enemies AI
  enemies.forEach(e=>{
    if(!e.alive){if(e.squashTimer>0)e.squashTimer--;return;}
    if(!e.noGravity){if(e.vy===undefined)e.vy=0;e.vy+=GRAVITY;if(e.vy>8)e.vy=8;e.y+=e.vy;
      const eF=e.y+e.h;if(isSolid(getTile(e.x+e.w/2,eF))||isSolid(getTile(e.x+2,eF))||isSolid(getTile(e.x+e.w-2,eF))){e.y=Math.floor(eF/TILE)*TILE-e.h;e.vy=0;}}

    if(e.type==='ghost'){const dx=p.x-e.x,dy=p.y-e.y,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<dc.ghostAggroRange){e.x+=(dx/dist)*.7*dc.enemySpeed;e.y+=(dy/dist)*.5*dc.enemySpeed;}else e.y=e.originY+Math.sin(animFrame*.04)*15;
      e.vx=p.x>e.x?.1:-.1;}
    else if(e.type==='bat'||e.type==='icebat'){e.x+=e.vx;e.y=e.originY+Math.sin(animFrame*.06+e.sineOffset)*30;if(e.x<0||e.x>lvl.width*TILE)e.vx*=-1;}
    else if(e.type==='cannon'){e.shootTimer--;if(e.shootTimer<=0){e.shootTimer=e.shootInterval;const dir=p.x>e.x?1:-1;
      enemyProjectiles.push({x:e.x+e.w/2+dir*8,y:e.y+e.h/2-3,vx:dir*2.5*dc.enemySpeed,vy:0,life:120,type:'fireball'});playTone(150,.1,'sawtooth',.08,300);}}
    else if(e.type==='bouncer'){e.bounceTimer++;if(e.bounceTimer>40&&e.vy===0){e.vy=dc.bouncerJumpForce;e.bounceTimer=0;e.vx=(p.x>e.x?1.5:-1.5)*dc.enemySpeed;}
      e.x+=e.vx;const ef=e.vx>0?e.x+e.w:e.x;if(isSolid(getTile(ef,e.y+e.h/2)))e.vx*=-1;}
    else{e.x+=e.vx;const ef2=e.y+e.h+2,ef=e.vx>0?e.x+e.w:e.x;if(isSolid(getTile(ef,e.y+e.h/2)))e.vx*=-1;
      const gA=getTile(ef,ef2);if(!isSolid(gA)&&isSolid(getTile(e.x+e.w/2,ef2)))e.vx*=-1;}
    e.frameTimer++;if(e.frameTimer>15){e.frame=1-e.frame;e.frameTimer=0;}

    const shm=dc.stompHitbox||1;
    if(p.invincible<=0&&rectOverlap({x:p.x+2,y:p.y,w:p.w-4,h:p.h},{x:e.x,y:e.y,w:e.w,h:e.h})){
      if(!e.noStomp&&p.vy>0&&p.y+p.h-4<e.y+e.h*shm/2){e.alive=false;e.squashTimer=30;p.vy=-5;score+=Math.round(200*dc.scoreMultiplier);spawnParticles(e.x+e.w/2,e.y,'#ff6600',8);sfxStomp();}
      else{playerHit();return;}}
  });

  // Enemy projectiles
  enemyProjectiles.forEach(ep=>{ep.x+=ep.vx;ep.y+=ep.vy;ep.life--;
    if(isSolid(getTile(ep.x,ep.y))||isSolid(getTile(ep.x+6,ep.y)))ep.life=0;
    if(p.invincible<=0&&rectOverlap({x:p.x+2,y:p.y,w:p.w-4,h:p.h},{x:ep.x,y:ep.y,w:8,h:8})){ep.life=0;playerHit();}
    arrows.forEach(a=>{if(rectOverlap({x:a.x,y:a.y,w:12,h:4},{x:ep.x,y:ep.y,w:8,h:8})){ep.life=0;a.life=0;score+=Math.round(50*dc.scoreMultiplier);spawnParticles(ep.x+4,ep.y+4,'#ffaa00',5);}});
  });
  enemyProjectiles=enemyProjectiles.filter(ep=>ep.life>0);

  // Boss fight
  if(boss&&boss.alive){
    const b=boss;
    b.frameTimer++;if(b.frameTimer>12){b.frame=1-b.frame;b.frameTimer=0;}
    if(b.hurtTimer>0)b.hurtTimer--;
    // Face player
    b.facing=p.x<b.x?-1:1;
    // Shoot fireballs
    b.shootTimer++;
    if(b.shootTimer>=b.shootInterval){
      b.shootTimer=0;
      const dir=p.x>b.x+b.w/2?1:-1;
      enemyProjectiles.push({x:b.x+b.w/2+dir*10,y:b.y+b.h/2,vx:dir*2.5,vy:-1,life:120});
      enemyProjectiles.push({x:b.x+b.w/2+dir*10,y:b.y+b.h/2,vx:dir*2,vy:-2,life:100});
      playTone(150,.2,'sawtooth',.08,80);
    }
    // Roar when losing HP thresholds
    if(b.roarTimer>0){b.roarTimer--;b.vx=0;}
    else if(b.roarCooldown>0)b.roarCooldown--;
    // Charge at player periodically
    if(b.roarTimer<=0){
      b.chargeTimer++;
      if(!b.charging&&b.chargeTimer>180){
        b.charging=true;b.chargeTimer=0;
        b.chargeVx=(p.x>b.x?1:-1)*3*dc.enemySpeed;
        playTone(100,.3,'square',.1,60);
        spawnParticles(b.x+b.w/2,b.y+b.h,'#886644',8);
      }
      if(b.charging){
        b.x+=b.chargeVx;
        b.chargeTimer++;
        if(b.chargeTimer>60){b.charging=false;b.chargeTimer=0;b.vx=0;}
      } else {
        const paceDir=p.x>b.x+b.w/2?1:-1;
        b.vx=paceDir*0.3*dc.enemySpeed;
        b.x+=b.vx;
      }
    }
    // Keep boss in bounds
    const bMinX=(lvl.rescuePos[0]-8)*TILE, bMaxX=(lvl.rescuePos[0]+2)*TILE;
    b.x=Math.max(bMinX,Math.min(b.x,bMaxX));
    // Player collision with boss
    if(p.invincible<=0&&rectOverlap({x:p.x+2,y:p.y,w:p.w-4,h:p.h},{x:b.x,y:b.y,w:b.w,h:b.h})){
      const shm=dc.stompHitbox||1;
      if(p.vy>0&&p.y+p.h-4<b.y+b.h*shm/2){
        // Stomp the boss
        b.hp--;b.hurtTimer=20;p.vy=-7;
        spawnParticles(b.x+b.w/2,b.y,'#ff6600',10);sfxStomp();
        score+=Math.round(100*dc.scoreMultiplier);
        // Roar at HP thresholds
        if(b.hp>0&&b.roarCooldown<=0&&(b.hp===Math.floor(b.maxHp*.5)||b.hp===Math.floor(b.maxHp*.25))){
          b.roarTimer=50;b.roarCooldown=120;b.charging=false;
          playTone(80,.5,'sawtooth',.15,50);setTimeout(()=>playTone(60,.4,'square',.12,40),150);
          spawnParticles(b.x+b.w/2,b.y+b.h*.3,'#ff4400',15);
        }
        if(b.hp<=0){b.alive=false;bossDefeated=true;score+=Math.round(1000*dc.scoreMultiplier);spawnParticles(b.x+b.w/2,b.y+b.h/2,'#ffaa00',25);sfxWin();}
      } else {
        playerHit();
      }
    }
    // Arrows hit boss
    arrows.forEach(a=>{if(a.life>0&&rectOverlap({x:a.x,y:a.y,w:12,h:4},{x:b.x,y:b.y,w:b.w,h:b.h})){
      a.life=0;b.hp--;b.hurtTimer=15;
      spawnParticles(a.x,a.y,'#ffaa00',6);sfxStomp();
      score+=Math.round(100*dc.scoreMultiplier);
      if(b.hp<=0){b.alive=false;bossDefeated=true;score+=Math.round(1000*dc.scoreMultiplier);spawnParticles(b.x+b.w/2,b.y+b.h/2,'#ffaa00',25);sfxWin();}
    }});
  }

  // Check rescue (boss must be defeated on final level)
  const rs=getRescueSprites(),rTX=lvl.rescuePos[0],rGY=findGroundY(rTX),rDH=spriteH(rs.sprite,2),rX=rTX*TILE,rY=rGY-rDH;
  const canRescue=!boss||bossDefeated;
  if(canRescue&&rectOverlap({x:p.x,y:p.y,w:p.w,h:p.h},{x:rX,y:rY,w:16,h:rDH})){gameState='levelcomplete';stateTimer=200;score+=Math.round(500*dc.scoreMultiplier);spawnParticles(rX+6,rY,'#ff69b4',20);sfxWin();stopBGM();}

  camera.x=p.x-BASE_W/2+p.w/2;camera.y=p.y-BASE_H/2;
  camera.x=Math.max(0,Math.min(camera.x,lvl.width*TILE-BASE_W));camera.y=Math.max(0,Math.min(camera.y,lvl.height*TILE-BASE_H));
  particles.forEach(pt=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=.15;pt.life--;});particles=particles.filter(pt=>pt.life>0);
smashTexts.forEach(st=>{st.y-=0.5;st.life--;});smashTexts=smashTexts.filter(st=>st.life>0);
  clearJP();
}

function playerHit(){const p=player,dc=DC(),iTime=dc.invincibleTime||60;if(p.hasCape){p.hasCape=false;p.invincible=iTime;p.vy=-4;spawnParticles(p.x+8,p.y+4,'#ff4400',10);playTone(400,.15,'sawtooth',.12,200);return;}playerDie();}
function playerDie(){lives--;gameState='dead';stateTimer=90;spawnParticles(player.x+6,player.y+8,'#ff3333',12);sfxHurt();stopBGM();}

// ==========================================
//  DRAW
// ==========================================
function draw(){
  const lvl=LEVELS[currentLevel];
  ctx.fillStyle=lvl?lvl.bg:'#88ccff';ctx.fillRect(0,0,BASE_W,BASE_H);
  if(gameState==='debug'){drawDebug();clearJP();return;}
  if(gameState==='title'){drawTitle();clearJP();return;}
  if(gameState==='intro'){drawIntro();clearJP();return;}
  if(gameState==='difficulty'){drawDifficulty();clearJP();return;}
  if(gameState==='select'){drawSelect();clearJP();return;}
  if(gameState==='between'){drawBetween();clearJP();return;}
  if(gameState==='gameover'){drawGameOver();clearJP();return;}
  if(gameState==='win'){drawWin();clearJP();return;}

  // Clouds
  if(lvl.clouds){ctx.fillStyle='rgba(255,255,255,0.7)';lvl.clouds.forEach(([cx,cy])=>{const sx=cx*TILE-camera.x*.3,sy=cy*TILE;
    ctx.beginPath();ctx.ellipse(sx+15,sy+8,18,10,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(sx+5,sy+10,10,8,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(sx+25,sy+10,10,8,0,0,Math.PI*2);ctx.fill();});}

  ctx.save();ctx.translate(-Math.round(camera.x),-Math.round(camera.y));
  const sTX=Math.floor(camera.x/TILE),eTX=Math.ceil((camera.x+BASE_W)/TILE),sTY=Math.floor(camera.y/TILE),eTY=Math.ceil((camera.y+BASE_H)/TILE);
  for(let ty=sTY;ty<=eTY;ty++) for(let tx=sTX;tx<=eTX;tx++){
    if(ty<0||ty>=lvl.height||tx<0||tx>=lvl.width)continue;const tile=map[ty][tx],dx=tx*TILE,dy=ty*TILE;
    if(tile===1){ctx.fillStyle=lvl.groundColor;ctx.fillRect(dx,dy,TILE,TILE);if(ty>0&&!isSolid(map[ty-1][tx])){ctx.fillStyle=lvl.groundTop||'#2d8a2d';ctx.fillRect(dx,dy,TILE,3);}}
    else if(tile===2){ctx.fillStyle=lvl.brickColor;ctx.fillRect(dx,dy,TILE,TILE);ctx.strokeStyle='#00000033';ctx.strokeRect(dx+.5,dy+.5,TILE-1,TILE-1);ctx.fillStyle='#00000022';ctx.fillRect(dx+7,dy,1,TILE);ctx.fillRect(dx,dy+7,TILE,1);}
    else if(tile===3){ctx.fillStyle='#ffcc00';ctx.fillRect(dx,dy,TILE,TILE);ctx.strokeStyle='#cc8800';ctx.strokeRect(dx+.5,dy+.5,TILE-1,TILE-1);ctx.fillStyle='#cc8800';ctx.font='10px monospace';ctx.fillText('?',dx+4,dy+12);}
    else if(tile===4){
  const cdx=tx*TILE+8-player.x,cdy=ty*TILE+8-player.y,cdist=Math.sqrt(cdx*cdx+cdy*cdy);
  const wobble=cdist<40?Math.sin(animFrame*.3)*1.5:0;
  ctx.save();ctx.translate(dx+8,dy+TILE);ctx.rotate(wobble*Math.PI/180);
  ctx.fillStyle='#b8783c';ctx.fillRect(-8,-TILE,TILE,TILE);
  ctx.strokeStyle='#8b5a2b';ctx.strokeRect(-7.5,-TILE+.5,TILE-1,TILE-1);
  ctx.strokeStyle='#8b5a2b';ctx.beginPath();ctx.moveTo(-8,-TILE);ctx.lineTo(8,0);ctx.moveTo(8,-TILE);ctx.lineTo(-8,0);ctx.stroke();
  ctx.restore();
}
  }

  // Stars, pickups
  stars.forEach(s=>{if(!s.collected){const b=Math.sin(animFrame*.1)*2;drawSprite(STAR_S,s.x,s.y+b,STAR_P,1.5,false);}});
  bowPickups.forEach(b=>{if(b.collected)return;const bob=Math.sin(animFrame*.08+b.x)*3;ctx.fillStyle='rgba(255,200,50,0.15)';ctx.beginPath();ctx.arc(b.x+8,b.y+8,14+Math.sin(animFrame*.1)*3,0,Math.PI*2);ctx.fill();drawSprite(BOW_S,b.x,b.y+bob,BOW_P,2,false);});
  superPickups.forEach(s=>{if(s.collected)return;const bob=Math.sin(animFrame*.06+s.x)*4,r=16+Math.sin(animFrame*.08)*4;ctx.fillStyle='rgba(255,100,0,0.15)';ctx.beginPath();ctx.arc(s.x+8,s.y+8,r,0,Math.PI*2);ctx.fill();drawSprite(SUPER_S,s.x,s.y+bob,SUPER_P,2,false);});
  // Cat pickup (uncollected)
  if(catPickup&&!catPickup.collected){
    const bob=Math.sin(animFrame*.07+catPickup.x)*4;
    ctx.fillStyle='rgba(100,100,150,0.25)';ctx.beginPath();ctx.arc(catPickup.x+8,catPickup.y+10,18+Math.sin(animFrame*.09)*3,0,Math.PI*2);ctx.fill();
    drawSprite(CAT_S,catPickup.x,catPickup.y+bob,CAT_P,2,false);
  }
  // Cat companion (following player)
  if(cat){
    drawSprite(CAT_S,cat.x,cat.y,CAT_P,2,cat.facing<0);
    // Meow text occasionally
    if(animFrame%200<40){ctx.fillStyle='#aabbcc';ctx.font='bold 7px monospace';ctx.fillText(T('meow'),cat.x,cat.y-4);}
    // Scratch effect
    if(cat.scratchTimer>20&&cat.scratchTarget){
      drawSprite(CAT_SCRATCH_S,cat.scratchTarget.x-5,cat.scratchTarget.y-5,CAT_SCRATCH_P,2,false);
    }
  }

  // Rescue NPC — in cage on boss level, free otherwise
  const rsSpr=getRescueSprites(),rTX=lvl.rescuePos[0],rGY=findGroundY(rTX),rDH=spriteH(rsSpr.sprite,2),rX=rTX*TILE,rY=rGY-rDH;
  const isFinalLvl=(currentLevel===LEVELS.length-1);
  if(boss&&boss.alive&&isFinalLvl){
    // Sibling trapped in cage
    const cageW=40,cageH=50;
    const cageX=rX-8,cageY=rY-8;
    // Cage background
    ctx.fillStyle='rgba(50,40,30,0.3)';ctx.fillRect(cageX,cageY,cageW,cageH);
    // Sibling inside
    const bob=Math.sin(animFrame*.08)*2;
    drawSprite(rsSpr.sprite,rX,rY+bob,rsSpr.palette,2,false);
    // Cage bars
    ctx.strokeStyle='#888888';ctx.lineWidth=2;
    for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(cageX+i*10+2,cageY);ctx.lineTo(cageX+i*10+2,cageY+cageH);ctx.stroke();}
    ctx.strokeStyle='#999999';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(cageX,cageY);ctx.lineTo(cageX+cageW,cageY);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cageX,cageY+cageH);ctx.lineTo(cageX+cageW,cageY+cageH);ctx.stroke();
    // Sibling cry
    if(animFrame%80<50){ctx.fillStyle='#3388ff';ctx.font='bold 7px monospace';ctx.fillText(T('help_cry'),rX-2,rY-12);}
  } else if(!boss||bossDefeated){
    const bob=Math.sin(animFrame*.05)*2;drawSprite(rsSpr.sprite,rX,rY+bob,rsSpr.palette,2,false);
    if(animFrame%120<80){ctx.fillStyle='#ff69b4';ctx.font='bold 8px monospace';ctx.fillText(T('help_npc'),rX-2,rY-8);}
  }

  // Enemies
  enemies.forEach(e=>{if(!e.alive&&e.squashTimer<=0)return;ctx.globalAlpha=!e.alive?e.squashTimer/30:1;
    const info=getEnemySpriteInfo(e.type),fl=e.vx>0,wb=e.alive?Math.sin(animFrame*.15+e.x):0;
    if(e.type==='ghost'&&e.alive)ctx.globalAlpha=.6+Math.sin(animFrame*.08)*.2;
    if(!e.alive){ctx.save();ctx.translate(e.x,e.y+e.h*.7);ctx.scale(1,.3);drawSprite(info.sprite,0,0,info.palette,ENEMY_SCALE,fl);ctx.restore();}
    else drawSprite(info.sprite,e.x,e.y+wb,info.palette,ENEMY_SCALE,fl);
    if(e.type==='cannon'&&e.alive&&e.shootTimer>e.shootInterval-5){ctx.fillStyle='rgba(255,150,0,0.5)';const dir=player.x>e.x?1:-1;ctx.beginPath();ctx.arc(e.x+e.w/2+dir*10,e.y+e.h/2,5,0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;});

  // Boss
  if(boss){
    if(boss.alive){
      const bfl=boss.facing>0;
      if(boss.hurtTimer>0&&boss.hurtTimer%4<2)ctx.globalAlpha=0.5;
      // Pick sprite frame based on state
      let bossSpr=BOSS_IDLE;
      let bWob=Math.sin(animFrame*.08)*2;
      if(boss.roarTimer&&boss.roarTimer>0){
        bossSpr=BOSS_ROAR;
        bWob=Math.sin(animFrame*.25)*3;
        // Roar shockwave rings
        if(animFrame%6===0){const rx=boss.x+boss.w/2+(bfl?20:-20),ry=boss.y+boss.h*.35;
          for(let i=0;i<3;i++)spawnParticles(rx+Math.random()*20-10,ry+Math.random()*10-5,'#ffaa44',1);}
      }else if(boss.charging){
        bossSpr=BOSS_CHARGE;
        bWob=Math.sin(animFrame*.4)*4;
        // Dust particles while charging
        if(animFrame%2===0)spawnParticles(boss.x+(bfl?0:boss.w),boss.y+boss.h,'#aa8866',3);
        // Ground shake effect
        if(animFrame%4===0)spawnParticles(boss.x+Math.random()*boss.w,boss.y+boss.h,'#665544',2);
      }else if(Math.abs(boss.vx)>0.1||boss.chargeTimer>120){
        bossSpr=boss.frame===0?BOSS_IDLE:BOSS_WALK;
        bWob=Math.sin(animFrame*.12)*2;
      }
      drawSprite(bossSpr,boss.x,boss.y+bWob,BOSS_P,4,bfl);
      // Angry eyes glow when low HP
      if(boss.hp<=boss.maxHp*.5){
        const glowI=0.2+Math.sin(animFrame*.15)*0.15;
        const glowR=boss.hp<=boss.maxHp*.25?8:5;
        ctx.fillStyle='rgba(255,50,0,'+glowI+')';
        ctx.beginPath();ctx.arc(boss.x+(bfl?boss.w*.65:boss.w*.35),boss.y+bWob+boss.h*.22,glowR,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(boss.x+(bfl?boss.w*.55:boss.w*.45),boss.y+bWob+boss.h*.22,glowR,0,Math.PI*2);ctx.fill();
      }
      // Scar marks when damaged
      if(boss.hp<boss.maxHp*.75){
        ctx.strokeStyle='rgba(100,40,20,0.4)';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(boss.x+boss.w*.3,boss.y+bWob+boss.h*.5);ctx.lineTo(boss.x+boss.w*.4,boss.y+bWob+boss.h*.6);ctx.stroke();
      }
      ctx.globalAlpha=1;
      // Health bar
      const hbW=boss.w,hbH=6,hbX=boss.x,hbY=boss.y-12;
      ctx.fillStyle='#330000';ctx.fillRect(hbX,hbY,hbW,hbH);
      ctx.fillStyle=boss.hp>boss.maxHp*.5?'#44cc44':boss.hp>boss.maxHp*.25?'#cccc44':'#cc4444';
      ctx.fillRect(hbX+1,hbY+1,(hbW-2)*(boss.hp/boss.maxHp),hbH-2);
      ctx.strokeStyle='#000';ctx.lineWidth=1;ctx.strokeRect(hbX,hbY,hbW,hbH);
      // Boss taunt
      if(animFrame%180<100){
        const phrases=T('boss_taunt');
        const pi=Math.floor(animFrame/180)%phrases.length;
        ctx.fillStyle='#fff';ctx.font='bold 8px monospace';ctx.textAlign='center';
        ctx.fillText(phrases[pi],boss.x+boss.w/2,boss.y-18);ctx.textAlign='left';
      }
    } else if(bossDefeated){
      // Defeated explosion particles
      if(animFrame%8===0)spawnParticles(boss.x+Math.random()*boss.w,boss.y+Math.random()*boss.h,'#ffaa00',3);
    }
  }

  // Enemy projectiles
  enemyProjectiles.forEach(ep=>{const f=Math.sin(animFrame*.3+ep.x)*.3;ctx.globalAlpha=.8+f*.2;drawSprite(FIREBALL_S,ep.x,ep.y,FIREBALL_P,2,false);ctx.fillStyle='rgba(255,100,0,0.3)';ctx.fillRect(ep.vx>0?ep.x-4:ep.x+10,ep.y+2,4,4);ctx.globalAlpha=1;});

  // Arrows
  arrows.forEach(a=>{drawSprite(ARROW_S,a.x,a.y,ARROW_P,2,a.vx<0);ctx.fillStyle='rgba(255,200,100,0.4)';ctx.fillRect(a.vx>0?a.x-6:a.x+14,a.y+1,6,2);});

  // Player
  const p=player;
  if(p.invincible<=0||Math.floor(animFrame/3)%2===0){const ps=getPlayerSprites();let spr;if(p.frame===0)spr=ps.stand;else if(p.frame===1)spr=ps.run;else spr=ps.jump;
    if(p.hasCape){const cx=p.facing>0?p.x-8:p.x+p.w-4,cw=Math.sin(animFrame*.15)*2;drawSprite(CAPE_S,cx,p.y+6+cw,CAPE_P,2,p.facing<0);}
    drawSprite(spr,p.x-2,p.y-2,ps.palette,2,p.facing<0);}

  particles.forEach(pt=>{ctx.fillStyle=pt.color;ctx.globalAlpha=pt.life/40;ctx.fillRect(pt.x,pt.y,3,3);});ctx.globalAlpha=1;
smashTexts.forEach(st=>{
  ctx.save();ctx.globalAlpha=st.life/60;
  ctx.fillStyle='#ffdd00';ctx.strokeStyle='#ff4400';ctx.lineWidth=2;
  ctx.font=`bold ${Math.floor(14*st.scale)}px monospace`;
  ctx.textAlign='center';
  ctx.strokeText(st.text,st.x-camera.x,st.y-camera.y);
  ctx.fillText(st.text,st.x-camera.x,st.y-camera.y);
  ctx.restore();
});
  ctx.restore();

  // HUD
  if(lives===Infinity){drawSprite(HEART_S,8,8,HEART_P,2,false);ctx.fillStyle='#fff';ctx.font='bold 16px monospace';ctx.fillText('∞',28,22);}
  else{for(let i=0;i<lives;i++)drawSprite(HEART_S,8+i*18,8,HEART_P,2,false);}
  ctx.fillStyle='#fff';ctx.font='bold 14px monospace';ctx.fillText(T('score')+score,BASE_W-140,22);
  const lvlNames=['level_1','level_2','level_3','level_4','level_5','level_6'];
  ctx.fillStyle='#ffffffaa';ctx.font='10px monospace';ctx.fillText(T(lvlNames[currentLevel])+' ['+TDiff(selectedDifficulty)+']',BASE_W/2-60,16);
  let hx=BASE_W-40;if(cat&&cat.hitsLeft>0){drawSprite(CAT_S,hx,30,CAT_P,1.5,false);ctx.fillStyle='#fff';ctx.font='bold 8px monospace';ctx.fillText('x'+cat.hitsLeft,hx+2,48);hx-=22;}
  if(p.hasCape){drawSprite(SUPER_S,hx,32,SUPER_P,1.5,false);hx-=22;}
  if(p.hasBow){drawSprite(BOW_S,hx,32,BOW_P,1.5,false);ctx.fillStyle='#fff';ctx.font='bold 10px monospace';ctx.fillText('x'+p.bowCharges,hx+2,50);}
  // Boss HUD
  if(boss&&boss.alive){
    const bHW=120,bHH=10,bHX=BASE_W/2-bHW/2,bHY=BASE_H-22;
    ctx.fillStyle='#330000';ctx.fillRect(bHX,bHY,bHW,bHH);
    ctx.fillStyle=boss.hp>boss.maxHp*.5?'#44cc44':boss.hp>boss.maxHp*.25?'#cccc44':'#cc4444';
    ctx.fillRect(bHX+1,bHY+1,(bHW-2)*(boss.hp/boss.maxHp),bHH-2);
    ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.strokeRect(bHX,bHY,bHW,bHH);
    ctx.fillStyle='#fff';ctx.font='bold 9px monospace';ctx.textAlign='center';ctx.fillText('BOSS',BASE_W/2,bHY-3);ctx.textAlign='left';
  }
  if(boss&&bossDefeated&&animFrame%60<40){
    ctx.fillStyle='#ffdd00';ctx.font='bold 20px monospace';ctx.textAlign='center';ctx.fillText(T('boss_defeated'),BASE_W/2,BASE_H/2-30);ctx.textAlign='left';
  }

  if(gameState==='levelcomplete'){ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(0,0,BASE_W,BASE_H);ctx.fillStyle='#ff69b4';ctx.font='bold 24px monospace';ctx.textAlign='center';ctx.fillText(getRescueSprites().name.toUpperCase()+T('is_safe'),BASE_W/2,BASE_H/2-10);ctx.fillStyle='#fff';ctx.font='14px monospace';ctx.fillText(currentLevel<LEVELS.length-1?T('next_world'):T('you_did_it'),BASE_W/2,BASE_H/2+20);ctx.textAlign='left';}
  if(gameState==='dead'){ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(0,0,BASE_W,BASE_H);ctx.fillStyle='#ff3333';ctx.font='bold 20px monospace';ctx.textAlign='center';ctx.fillText(T('oops'),BASE_W/2,BASE_H/2);ctx.textAlign='left';}
}

  for(let i=0;i<8;i++){const fx=40+i*75,fy=BASE_H-65;ctx.fillStyle='#33aa33';ctx.fillRect(fx,fy,2,12);ctx.fillStyle=['#ff6688','#ffaa33','#ff55aa','#ffff44'][i%4];ctx.beginPath();ctx.arc(fx+1,fy-2,4,0,Math.PI*2);ctx.fill();}

  const heroX=180,heroY=BASE_H-80-spriteH(heroStand,3);
  const sibX=260,sibY=BASE_H-80-spriteH(sibStand,3);

  // Phase 1: Both playing (t 0-200)
  if(t<200){
    const gb=Math.sin(t*.1)*3;
    drawSprite(t%40<20?heroStand:heroRun,heroX,heroY+gb,heroPal,3,false);
    drawSprite(t%40<20?sibStand:sibStand,sibX,sibY+Math.sin(t*.12)*3,sibPal,3,false);
    if(t>30){ctx.fillStyle='#ff69b4';ctx.font='bold 12px monospace';ctx.textAlign='center';ctx.fillText(T('la_la'),sibX+15,sibY-10);ctx.textAlign='left';}
  }

  // Phase 2: Enemy stomps in (t 170-359) — rotating kidnapper
  const ik=getKidnapper(0);
  if(t>=170&&t<360){
    const dinoEnterX=t<290?BASE_W+20-(t-170)*3:BASE_W+20-120*3;
    const dinoX=Math.max(sibX+20,dinoEnterX);
    const dinoY=BASE_H-80-spriteH(ik.s,4);
    drawSprite(ik.s,dinoX,dinoY+(t>=290?Math.sin(t*.3)*2:0),ik.p,4,true);
    // Speech bubble
    if(t>=250){
      const bubX=dinoX-10,bubY=dinoY-40;
      ctx.fillStyle='#fff';ctx.strokeStyle='#333';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(bubX,bubY);ctx.lineTo(bubX+140,bubY);ctx.lineTo(bubX+140,bubY+30);ctx.lineTo(bubX+30,bubY+30);ctx.lineTo(bubX+20,bubY+40);ctx.lineTo(bubX+15,bubY+30);ctx.lineTo(bubX,bubY+30);ctx.closePath();ctx.fill();ctx.stroke();
      ctx.fillStyle=ik.color;ctx.font='bold 10px monospace';ctx.textAlign='center';
      const phrases=T('dino_phrases');
      const pi=Math.floor((t-250)/40)%phrases.length;
      ctx.fillText(phrases[pi],bubX+70,bubY+18);
      ctx.textAlign='left';
    }
  }

  // Sibling and hero standing during dino approach
  if(t>=200&&t<360){
    drawSprite(sibStand,sibX,sibY,sibPal,3,false);
    if(t>=230){ctx.fillStyle='#ff3333';ctx.font='bold 12px monospace';ctx.textAlign='center';ctx.fillText('???',sibX+15,sibY-10);ctx.textAlign='left';}
    const gb2=Math.sin(t*.15)*2;drawSprite(heroStand,heroX,heroY+gb2,heroPal,3,false);
  }

  // Phase 3: Enemy grabs sibling and runs (t 360+)
  if(t>=360){
    const runX=sibX+20+(t-360)*3;
    const dinoRunY=BASE_H-80-spriteH(ik.s,4);
    const bounce=Math.abs(Math.sin(t*.15))*4;
    drawSprite(ik.s,runX,dinoRunY+bounce,ik.p,4,false);
    drawSprite(sibJump,runX+10,dinoRunY-spriteH(sibStand,2)+5+bounce,sibPal,2,false);
    if((t-360)%30<20){ctx.fillStyle='#3388ff';ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.fillText(T('help_cry'),runX+20,dinoRunY-spriteH(sibStand,2)-5);ctx.textAlign='left';}
    // Hero reacts
    drawSprite(heroStand,heroX,heroY,heroPal,3,false);
    if(t<480){ctx.fillStyle='#ff3333';ctx.font='bold 14px monospace';ctx.textAlign='center';ctx.fillText(sibName+'!!!',heroX+15,heroY-15);ctx.textAlign='left';}
    else{ctx.fillStyle='#ffdd00';ctx.font='bold 14px monospace';ctx.textAlign='center';ctx.fillText(T('i_come_help'),heroX+15,heroY-15);ctx.textAlign='left';}
  }

  // Dramatic rotating headline
  if(t>=420){
    ctx.save();
    ctx.translate(BASE_W/2,BASE_H/2-40);
    const rot=Math.sin(t*.04)*.15;
    const scale=Math.min(1,(t-420)/30);
    ctx.rotate(rot);ctx.scale(scale,scale);
    ctx.fillStyle='#ff3333';ctx.font='bold 32px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.strokeStyle='#000';ctx.lineWidth=3;
    const headline=T('save_sib')+' '+sibName+'!';
    ctx.strokeText(headline,0,0);ctx.fillText(headline,0,0);
    ctx.fillStyle='#ffdd00';ctx.font='bold 16px monospace';
    const sub=T('adventure_begins');
    ctx.strokeText(sub,0,35);ctx.fillText(sub,0,35);
    ctx.textAlign='left';ctx.textBaseline='alphabetic';
    ctx.restore();
  }

  // Skip hint
  if(t>90){
    const a=.3+Math.sin(t*.06)*.2;ctx.globalAlpha=a;
    ctx.fillStyle='#fff';ctx.font='10px monospace';ctx.textAlign='center';
    ctx.fillText(T('press_space'),BASE_W/2,BASE_H-10);
    ctx.textAlign='left';ctx.globalAlpha=1;
  }
}

function drawBetween(){
  const t=betweenTimer;
  const ps=getPlayerSprites(), rs=getRescueSprites();
  const sibName=rs.name.toUpperCase();
  const heroStand=ps.stand, heroRun=ps.run, heroPal=ps.palette;
  const sibStand=rs.sprite, sibPal=rs.palette;
  const sibJump=selectedChar==='gigi'?DODO_JUMP:GIGI_JUMP;
  const isBossLevel=(currentLevel===LEVELS.length-1);

  // Background - next level preview colors
  const nextLvl=LEVELS[currentLevel];

  if(isBossLevel){
    // === SPECIAL BOSS INTRO ===
    // Dark, dramatic scene — the ground shakes, boss emerges from shadows
    const shake=t>120&&t<200?Math.sin(t*1.2)*3:0;
    ctx.save();ctx.translate(shake,0);

    // Dark stormy sky
    const skyDark=Math.min(1,t/60);
    ctx.fillStyle='#'+Math.floor(0x33-0x22*skyDark).toString(16).padStart(2,'0')+Math.floor(0x22-0x11*skyDark).toString(16).padStart(2,'0')+Math.floor(0x44-0x22*skyDark).toString(16).padStart(2,'0');
    ctx.fillRect(0,0,BASE_W,BASE_H);
    // Ground
    ctx.fillStyle=nextLvl?nextLvl.groundColor:'#553322';ctx.fillRect(0,BASE_H-70,BASE_W,70);

    // Lightning flashes
    if(t>60&&t<200&&t%40<3){ctx.fillStyle='rgba(255,255,200,0.3)';ctx.fillRect(0,0,BASE_W,BASE_H);}

    // Storm clouds
    ctx.fillStyle='rgba(40,30,50,0.8)';
    [60,180,320,460,560].forEach((cx,i)=>{const cy=30+i*8+Math.sin(t*.02+i)*5;
      ctx.beginPath();ctx.ellipse(cx,cy,50,20,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(cx-25,cy+10,30,15,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(cx+25,cy+10,30,15,0,0,Math.PI*2);ctx.fill();
    });

    const heroX=80, heroY=BASE_H-70-spriteH(heroStand,3);

    // Phase 1 (0-100): Hero walks forward determined
    if(t<100){
      const walkX=heroX-40+t*.8;
      const bob=Math.sin(t*.2)*2;
      drawSprite(t%20<10?heroStand:heroRun,walkX,heroY+bob,heroPal,3,false);
      // Determined text
      if(t>40){
        ctx.fillStyle='#ffdd00';ctx.font='bold 11px monospace';ctx.textAlign='center';
        ctx.fillText(T('almost_there'),walkX+15,heroY-12);ctx.textAlign='left';
      }
    }

    // Phase 2 (100-200): Ground shakes, hero stops
    if(t>=100&&t<200){
      drawSprite(heroStand,heroX+40,heroY,heroPal,3,false);
      if(t>130){
        ctx.fillStyle='#ff4444';ctx.font='bold 12px monospace';ctx.textAlign='center';
        ctx.fillText('...?!',heroX+55,heroY-12);ctx.textAlign='left';
      }
      // Rumble particles from ground
      if(t%4===0){
        const rx=BASE_W*0.6+Math.random()*100;
        spawnParticles(rx,BASE_H-70,'#886655',2);
      }
    }

    // Phase 3 (200+): Boss dramatically appears from the right
    if(t>=200){
      // Hero stands scared
      drawSprite(heroStand,heroX+40,heroY,heroPal,3,false);
      if(t<300){
        ctx.fillStyle='#ff3333';ctx.font='bold 13px monospace';ctx.textAlign='center';
        ctx.fillText('!!!',heroX+55,heroY-12);ctx.textAlign='left';
      }

      // Boss enters from right — big and slow
      const bossEnterT=t-200;
      const bossTargetX=BASE_W*0.55;
      const bossX=bossEnterT<120?BASE_W+30-bossEnterT*2.5:bossTargetX;
      const bossY=BASE_H-70-spriteH(BOSS_IDLE,4);
      const bBounce=Math.abs(Math.sin(t*.08))*3;

      // Shadow underneath
      ctx.fillStyle='rgba(0,0,0,0.3)';
      ctx.beginPath();ctx.ellipse(bossX+spriteW(BOSS_IDLE,4)/2,BASE_H-68,40,8,0,0,Math.PI*2);ctx.fill();

      // Draw boss — use roar frame when arrived
      const bSpr=bossEnterT<120?BOSS_WALK:(bossEnterT%80<40?BOSS_ROAR:BOSS_IDLE);
      drawSprite(bSpr,bossX,bossY+bBounce,BOSS_P,4,true);

      // Boss speech bubble
      if(bossEnterT>=120){
        const bubX=bossX-160,bubY=bossY-45;
        ctx.fillStyle='#331111';ctx.strokeStyle='#ff3333';ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(bubX,bubY);ctx.lineTo(bubX+155,bubY);ctx.lineTo(bubX+155,bubY+35);ctx.lineTo(bubX+140,bubY+35);ctx.lineTo(bubX+155,bubY+48);ctx.lineTo(bubX+130,bubY+35);ctx.lineTo(bubX,bubY+35);ctx.closePath();ctx.fill();ctx.stroke();
        ctx.fillStyle='#ff4444';ctx.font='bold 10px monospace';ctx.textAlign='center';
        const bossPhrases=T('boss_intro_phrases');
        const pi=Math.floor((bossEnterT-120)/60)%bossPhrases.length;
        ctx.fillText(bossPhrases[pi],bubX+78,bubY+22);ctx.textAlign='left';
      }

      // Sibling trapped in cage on the far right
      if(bossEnterT>=80){
        const cageX=BASE_W-80, cageY=BASE_H-70-50;
        // Cage bars
        ctx.strokeStyle='#888';ctx.lineWidth=2;
        for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(cageX+i*12,cageY);ctx.lineTo(cageX+i*12,cageY+44);ctx.stroke();}
        ctx.beginPath();ctx.moveTo(cageX-2,cageY);ctx.lineTo(cageX+50,cageY);ctx.stroke();
        ctx.beginPath();ctx.moveTo(cageX-2,cageY+44);ctx.lineTo(cageX+50,cageY+44);ctx.stroke();
        // Sibling inside
        drawSprite(sibStand,cageX+8,cageY+44-spriteH(sibStand,2)-2,sibPal,2,false);
        if(bossEnterT%30<20){ctx.fillStyle='#3388ff';ctx.font='bold 9px monospace';ctx.textAlign='center';ctx.fillText(T('help_cry'),cageX+25,cageY-8);ctx.textAlign='left';}
      }
    }

    // Dramatic headline
    if(t>=320){
      ctx.save();ctx.translate(BASE_W/2,BASE_H/2-50);
      const scale=Math.min(1,(t-320)/30);
      const rot=Math.sin(t*.05)*.12;
      ctx.rotate(rot);ctx.scale(scale,scale);
      ctx.strokeStyle='#000';ctx.lineWidth=4;
      ctx.fillStyle='#ff2222';ctx.font='bold 30px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
      const headline=T('final_battle');
      ctx.strokeText(headline,0,0);ctx.fillText(headline,0,0);
      ctx.fillStyle='#ffcc00';ctx.font='bold 14px monospace';
      const sub=T('boss_awaits');
      ctx.strokeText(sub,0,35);ctx.fillText(sub,0,35);
      ctx.textAlign='left';ctx.textBaseline='alphabetic';ctx.restore();
    }

    ctx.restore();
  } else {
    // === NORMAL BETWEEN-LEVEL CUTSCENE ===
    ctx.fillStyle=nextLvl?nextLvl.bg:'#88ccff';ctx.fillRect(0,0,BASE_W,BASE_H);
    ctx.fillStyle=nextLvl?nextLvl.groundColor:'#44aa44';ctx.fillRect(0,BASE_H-70,BASE_W,70);

    const heroX=120, heroY=BASE_H-70-spriteH(heroStand,3);

    // Phase 1 (t 0-130): Hero and sibling happy together
    if(t<130){
      const bob=Math.sin(t*.12)*3;
      drawSprite(heroStand,heroX,heroY+bob,heroPal,3,false);
      drawSprite(sibStand,heroX+60,heroY+5+Math.sin(t*.15)*2,sibPal,3,false);
      ctx.fillStyle='#ff69b4';ctx.font='bold 12px monospace';ctx.textAlign='center';
      ctx.fillText('\u2665 \u2665 \u2665',heroX+45,heroY-10+bob);ctx.textAlign='left';
    }

    // Phase 2 (t 130+): Rotating enemy swoops in and grabs sibling
    const bk=getKidnapper(currentLevel);
    if(t>=130){
      drawSprite(heroStand,heroX,heroY,heroPal,3,false);

      const grabT=t-130;
      if(grabT<90){
        const eX=BASE_W+20-grabT*4;
        const eY=BASE_H-70-spriteH(bk.s,4);
        drawSprite(bk.s,eX,eY+Math.sin(t*.3)*2,bk.p,4,true);
        drawSprite(sibStand,heroX+60,heroY+5,sibPal,3,false);
        if(grabT>40){ctx.fillStyle='#ff3333';ctx.font='bold 12px monospace';ctx.textAlign='center';ctx.fillText('???',heroX+75,heroY-5);ctx.textAlign='left';}
      } else {
        const runX=heroX+60+(grabT-90)*3;
        const eY=BASE_H-70-spriteH(bk.s,4);
        const bounce=Math.abs(Math.sin(t*.15))*4;
        drawSprite(bk.s,runX,eY+bounce,bk.p,4,false);
        drawSprite(sibJump,runX+10,eY-spriteH(sibStand,2)+5+bounce,sibPal,2,false);
        if(grabT<200){
          const phrases=T('dino_between');
          const pi=(currentLevel-1)%phrases.length;
          const bubX=Math.min(runX-10,BASE_W-160),bubY=eY-35;
          ctx.fillStyle='#fff';ctx.strokeStyle='#333';ctx.lineWidth=2;
          ctx.beginPath();ctx.moveTo(bubX,bubY);ctx.lineTo(bubX+150,bubY);ctx.lineTo(bubX+150,bubY+25);ctx.lineTo(bubX+25,bubY+25);ctx.lineTo(bubX+15,bubY+35);ctx.lineTo(bubX+10,bubY+25);ctx.lineTo(bubX,bubY+25);ctx.closePath();ctx.fill();ctx.stroke();
          ctx.fillStyle=bk.color;ctx.font='bold 10px monospace';ctx.textAlign='center';
          ctx.fillText(phrases[pi],bubX+75,bubY+16);ctx.textAlign='left';
        }
        if((grabT)%30<20){ctx.fillStyle='#3388ff';ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.fillText(T('help_cry'),runX+20,eY-spriteH(sibStand,2)-5);ctx.textAlign='left';}
      }

      if(grabT>50){
        ctx.fillStyle='#ff3333';ctx.font='bold 14px monospace';ctx.textAlign='center';
        ctx.fillText(T('oh_no'),heroX+15,heroY-15);ctx.textAlign='left';
      }
    }

    // Big text
    if(t>=220){
      ctx.save();ctx.translate(BASE_W/2,BASE_H/2-50);
      const scale=Math.min(1,(t-220)/25);
      const rot=Math.sin(t*.03)*.1;
      ctx.rotate(rot);ctx.scale(scale,scale);
      ctx.strokeStyle='#000';ctx.lineWidth=3;
      ctx.fillStyle='#ff3333';ctx.font='bold 28px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.strokeText(sibName+T('sib_stolen_again'),0,0);
      ctx.fillText(sibName+T('sib_stolen_again'),0,0);
      ctx.fillStyle='#ffdd00';ctx.font='bold 16px monospace';
      const lvlNames=['level_1','level_2','level_3','level_4','level_5','level_6'];
      const nextName=T(lvlNames[currentLevel]);
      ctx.strokeText(T('keep_going')+' \u2192 '+nextName,0,35);
      ctx.fillText(T('keep_going')+' \u2192 '+nextName,0,35);
      ctx.textAlign='left';ctx.textBaseline='alphabetic';ctx.restore();
    }
  }

  // Skip hint
  if(t>60){
    const a=.3+Math.sin(t*.06)*.2;ctx.globalAlpha=a;
    ctx.fillStyle='#fff';ctx.font='10px monospace';ctx.textAlign='center';
    ctx.fillText(T('press_space'),BASE_W/2,BASE_H-10);
    ctx.textAlign='left';ctx.globalAlpha=1;
  }
}

function drawDebug(){
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,BASE_W,BASE_H);
  // Scanline effect
  for(let y=0;y<BASE_H;y+=4){ctx.fillStyle='rgba(0,255,100,0.03)';ctx.fillRect(0,y,BASE_W,1);}
  // Header
  ctx.fillStyle='#00ff66';ctx.font='bold 22px monospace';ctx.textAlign='center';
  ctx.fillText('DEBUG - LEVEL SELECT',BASE_W/2,40);
  ctx.fillStyle='#00cc55';ctx.font='11px monospace';
  ctx.fillText('Hold B to open \u2022 ESC to close',BASE_W/2,58);

  // Level cards
  const lvlNames=['level_1','level_2','level_3','level_4','level_5','level_6'];
  const cardW=85,cardH=120,gap=10;
  const totalW=LEVELS.length*(cardW+gap)-gap;
  const startX=(BASE_W-totalW)/2;

  LEVELS.forEach((lvl,i)=>{
    const x=startX+i*(cardW+gap), y=90;
    const sel=(i===debugLevelIndex);
    // Card background
    ctx.fillStyle=sel?'#113322':'#111122';
    ctx.fillRect(x,y,cardW,cardH);
    ctx.strokeStyle=sel?'#00ff66':'#334455';ctx.lineWidth=sel?2:1;
    ctx.strokeRect(x,y,cardW,cardH);
    // Level number
    ctx.fillStyle=sel?'#00ff66':'#667788';ctx.font='bold 14px monospace';ctx.textAlign='center';
    ctx.fillText((i+1)+'',x+cardW/2,y+20);
    // Level name
    ctx.fillStyle=sel?'#aaffcc':'#6688aa';ctx.font='9px monospace';
    ctx.fillText(T(lvlNames[i]),x+cardW/2,y+36);
    // Mini color preview
    ctx.fillStyle=lvl.bg;ctx.fillRect(x+10,y+44,cardW-20,25);
    ctx.fillStyle=lvl.groundColor;ctx.fillRect(x+10,y+60,cardW-20,9);
    // Boss indicator
    if(i===LEVELS.length-1){
      ctx.fillStyle='#ff4444';ctx.font='bold 8px monospace';
      ctx.fillText('BOSS',x+cardW/2,y+82);
    }
    // Enemy count
    ctx.fillStyle='#556677';ctx.font='8px monospace';
    ctx.fillText(lvl.enemyDefs.length+' enemies',x+cardW/2,y+95);
    // Selected arrow
    if(sel){
      ctx.fillStyle='#00ff66';ctx.font='bold 16px monospace';
      ctx.fillText('\u25b2',x+cardW/2,y+cardH+16);
    }
  });

  // Difficulty selector
  const dy=235;
  ctx.fillStyle='#00cc55';ctx.font='bold 13px monospace';ctx.textAlign='center';
  ctx.fillText('Difficulty: '+TDiff(DIFF_KEYS[diffIndex])+' (\u2191\u2193)',BASE_W/2,dy);
  ctx.fillStyle='#556677';ctx.font='10px monospace';
  ctx.fillText('\u2190\u2192 pick level \u2022 SPACE to start',BASE_W/2,dy+20);

  // Animated border
  const blink=Math.sin(animFrame*.08)>.3;
  if(blink){ctx.strokeStyle='#00ff6633';ctx.lineWidth=1;ctx.strokeRect(4,4,BASE_W-8,BASE_H-8);}
  ctx.textAlign='left';
}

function drawGameOver(){
  ctx.fillStyle='#220000';ctx.fillRect(0,0,BASE_W,BASE_H);ctx.fillStyle='#ff3333';ctx.font='bold 32px monospace';ctx.textAlign='center';
  ctx.fillText(T('game_over'),BASE_W/2,BASE_H/2-20);ctx.fillStyle='#fff';ctx.font='16px monospace';ctx.fillText(T('score_label')+score,BASE_W/2,BASE_H/2+20);
  ctx.font='12px monospace';ctx.fillText(T('press_retry'),BASE_W/2,BASE_H/2+50);ctx.textAlign='left';
}

function drawWin(){
  ctx.fillStyle='#112244';ctx.fillRect(0,0,BASE_W,BASE_H);
  if(animFrame%10===0)spawnParticles(Math.random()*BASE_W,Math.random()*BASE_H*.5,['#ff3355','#ffdd00','#33ff88','#3388ff','#ff69b4'][Math.floor(Math.random()*5)],15);
  particles.forEach(pt=>{ctx.fillStyle=pt.color;ctx.globalAlpha=pt.life/40;ctx.fillRect(pt.x,pt.y,4,4);});ctx.globalAlpha=1;
  particles.forEach(pt=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=.1;pt.life--;});particles=particles.filter(pt=>pt.life>0);
  const rn=getRescueSprites().name,hn=selectedChar==='gigi'?'Gigi':'Dodo';
  ctx.fillStyle='#ff69b4';ctx.font='bold 28px monospace';ctx.textAlign='center';ctx.fillText(rn.toUpperCase()+T('is_saved'),BASE_W/2,90);
  ctx.fillStyle='#ffdd00';ctx.font='bold 18px monospace';ctx.fillText(hn+T('is_the_best'),BASE_W/2,130);
  ctx.fillStyle='#aaddff';ctx.font='14px monospace';ctx.fillText(T('difficulty_label')+TDiff(selectedDifficulty)+T('final_score')+score,BASE_W/2,160);
  const ps=getPlayerSprites(),rs=getRescueSprites();
  drawSprite(ps.stand,BASE_W/2-45,180,ps.palette,4,false);drawSprite(rs.sprite,BASE_W/2+10,195,rs.palette,4,false);
  for(let i=0;i<5;i++){const hx=BASE_W/2-60+i*30,hy=175+Math.sin(animFrame*.08+i)*10;drawSprite(HEART_S,hx,hy,HEART_P,1.5,false);}
  ctx.fillStyle='#fff';ctx.font='12px monospace';ctx.fillText(T('press_play_again'),BASE_W/2,330);ctx.textAlign='left';
}

function gameLoop(){update();draw();requestAnimationFrame(gameLoop);}
gameLoop();
</script>
